<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE Prog — Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #16181D;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #logo-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #logo {
      width: clamp(300px, 40vw, 600px);
      height: auto;
      opacity: 0.92;
      filter: drop-shadow(0 0 32px rgba(230, 57, 70, 0.55))
              drop-shadow(0 0 80px rgba(230, 57, 70, 0.22));
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% {
        filter: drop-shadow(0 0 28px rgba(230, 57, 70, 0.5))
                drop-shadow(0 0 70px rgba(230, 57, 70, 0.2));
        opacity: 0.9;
      }
      50% {
        filter: drop-shadow(0 0 44px rgba(230, 57, 70, 0.75))
                drop-shadow(0 0 110px rgba(230, 57, 70, 0.35));
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="logo-wrap">
    <img id="logo" src="logo-blanc.png" alt="ACE Prog" />
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const NODE_COUNT = 80;
    const CONNECTION_DIST = 160;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const nodes = Array.from({ length: NODE_COUNT }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      radius: Math.random() * 2 + 1,
    }));

    const pulses = [];

    function dist(ax, ay, bx, by) {
      return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw connections
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const d = dist(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
          if (d < CONNECTION_DIST) {
            const alpha = (1 - d / CONNECTION_DIST) * 0.3;
            ctx.strokeStyle = `rgba(230,57,70,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();

            if (Math.random() < 0.0005) {
              pulses.push({
                ax: nodes[i].x, ay: nodes[i].y,
                bx: nodes[j].x, by: nodes[j].y,
                t: 0,
              });
            }
          }
        }
      }

      // Update & draw nodes
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(230,57,70,0.8)';
        ctx.fill();
      });

      // Update & draw pulses
      for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.t += 0.025;
        if (p.t >= 1) { pulses.splice(i, 1); continue; }
        const px = p.ax + (p.bx - p.ax) * p.t;
        const py = p.ay + (p.by - p.ay) * p.t;
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fill();
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
